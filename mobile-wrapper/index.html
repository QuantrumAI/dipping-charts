<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Dipping Chart</title>
  <style>
    /* Reset — WebView root. Dark background by default; themed from JS. */
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0e1116;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Pretendard", "Segoe UI", Roboto, sans-serif;
    }
    #boot-error {
      display: none;
      color: #eee;
      font-size: 13px;
      padding: 24px;
      line-height: 1.5;
    }
  </style>
  <!-- LightweightCharts standalone — shipped next to this HTML. -->
  <script src="./lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="boot-error"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
